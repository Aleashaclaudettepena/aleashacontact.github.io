<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Me</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #052010;
            color: white;
            margin: 0;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        p {
            text-align: center;
            margin-bottom: 30px;
        }

        form {
            max-width: 600px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: none;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        textarea {
            min-height: 120px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color: #0a3c24;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0f5130;
        }
    </style>
</head>
<body>

    <h1>Contact Me</h1>
    <p>If you have a question about this application, use the form below to reach out.</p>

    <form action="https://formsubmit.co/aleashac7449@bigfoot.spokane.edu" method="POST">
        
        <!-- Prevent spam -->
        <input type="hidden" name="_captcha" value="false">

        <!-- Redirect after submit -->
        <input type="hidden" name="_next" value="https://aleashaclaudettepena.github.io/thankyou.html">

        <label for="userEmail">Your Email Address:</label>
        <input type="email" id="userEmail" name="email" required>

        <label for="question">Your Question:</label>
        <textarea id="question" name="message" required></textarea>

        <button type="submit">Send Message</button>
    </form>

</body>
</html>
